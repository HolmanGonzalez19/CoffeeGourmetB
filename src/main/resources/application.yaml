spring:
  application:
    name: CoffeeGourmetB

  datasource:
    url: jdbc:postgresql://localhost:5432/CoffeeGourmet?currentSchema=coffeegourmet
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: coffeegourmet
server:
  port: 8080